name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve pinned runtime versions
        id: versions
        run: |
          NODE_VERSION="$(tr -d '[:space:]' < .node-version)"
          PNPM_VERSION="$(node -e 'const p=require("./package.json"); console.log((p.packageManager || "").split("@")[1] || "")')"
          NPM_VERSION="$(node -e 'const p=require("./package.json"); console.log((p.engines && p.engines.npm) || "")')"

          if [ -z "$NODE_VERSION" ] || [ -z "$PNPM_VERSION" ] || [ -z "$NPM_VERSION" ]; then
            echo "Missing pinned version(s). Check .node-version and package.json engines/packageManager."
            exit 1
          fi

          echo "node=$NODE_VERSION" >> "$GITHUB_OUTPUT"
          echo "pnpm=$PNPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm=$NPM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            NPM_VERSION=${{ steps.versions.outputs.npm }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
