services:
  longrunner-platform:
    image: ghcr.io/hutchybop/longrunner-platform:latest
    container_name: longrunner-platform
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const s=require('net').connect(3000,'127.0.0.1');s.setTimeout(5000);s.on('connect',()=>{s.end();process.exit(0)});s.on('timeout',()=>process.exit(1));s.on('error',()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - npm_network

networks:
  npm_network:
    external: true
