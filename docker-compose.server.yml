services:
  longrunner-platform:
    image: ghcr.io/hutchybop/longrunner-platform:latest
    container_name: longrunner-platform
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const ports=[3000,3001,3002,3003,3004];Promise.all(ports.map((port)=>fetch('http://127.0.0.1:'+port+'/health').then((res)=>{if(!res.ok){throw new Error(String(port));}}))).then(()=>process.exit(0)).catch(()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - npm_network

networks:
  npm_network:
    external: true
