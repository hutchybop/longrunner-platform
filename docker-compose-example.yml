services:
  longrunner-platform:
    image: ghcr.io/hutchybop/longrunner-platform:latest
    container_name: longrunner-platform
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get('http://127.0.0.1:3000/health',res=>process.exit(res.statusCode===200?0:1));req.setTimeout(5000,()=>{req.destroy();process.exit(1)});req.on('error',()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - npm_network

networks:
  npm_network:
    external: true
